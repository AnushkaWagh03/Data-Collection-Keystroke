server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets can be cached aggressively because Vite fingerprints filenames.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
